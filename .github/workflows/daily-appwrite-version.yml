name: Daily Appwrite Version Requests Check

on:
  schedule:
    # Run daily at 8:00 AM UTC (10:00 AM Israel time)
    - cron: '0 8 * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  check-version-requests:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Query Appwrite version_requests collection
        env:
          APPWRITE_ENDPOINT: https://cloud.appwrite.io/v1
          APPWRITE_PROJECT_ID: 69f6e5f7002432469f12
          APPWRITE_API_KEY: ${{ secrets.APPWRITE_API_KEY }}
          APPWRITE_DATABASE_ID: 69f6e611000c64a52e3c
          APPWRITE_COLLECTION_ID: version_requests
        run: |
          echo "Querying version_requests collection..."
          
          # Query the version_requests collection
          response=$(curl -s -X GET \
            "${APPWRITE_ENDPOINT}/databases/${APPWRITE_DATABASE_ID}/collections/${APPWRITE_COLLECTION_ID}/documents?queries[]=%7B%22method%22%3A%22limit%22%2C%22values%22%3A%5B5000%5D%7D" \
            -H "X-Appwrite-Project: ${APPWRITE_PROJECT_ID}" \
            -H "X-Appwrite-Key: ${APPWRITE_API_KEY}" \
            -H "Content-Type: application/json")
          
          echo "Response from Appwrite:"
          echo "$response" | jq '.documents'
          
          # Count the number of records
          count=$(echo "$response" | jq '.total')
          echo "Total version requests: $count"
          
          # Save to artifact
          echo "$response" | jq '.documents' > version_requests_report.json
          echo "Report saved to version_requests_report.json"

      - name: Upload report as artifact
        uses: actions/upload-artifact@v4
        with:
          name: version-requests-report-${{ github.run_number }}
          path: version_requests_report.json
          retention-days: 30

      - name: Send notification (optional)
        if: success()
        run: |
          echo "Daily version requests check completed successfully"
          # Add notification logic here if needed (e.g., to ntfy.sh)
